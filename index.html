<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Citizenship Test</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #faf8f3;
  color: #0d2137;
  padding: 20px;
  text-align: center;
}

h1 { font-size: 36px; }
.subtitle { font-size: 22px; color: #666; }

.card {
  background: white;
  max-width: 760px;
  margin: auto;
  padding: 28px;
  border-radius: 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}

.question {
  font-size: 24px;
  margin: 20px 0;
  text-align: left;
}

.answer {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 15px;
  border: 2px solid #ddd;
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
}

.correct {
  background: #dcfce7;
  border-color: #16a34a;
}

.wrong {
  background: #fee2e2;
  border-color: #c0392b;
}

/* 🔥 BUTTON FINAL */
button.explain-btn {
  margin-top: 12px;
  padding: 12px 18px;
  font-size: 16px;
  font-weight: bold;
  background: #facc15;
  color: black;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.25s ease;
}

/* HOVER */
button.explain-btn:hover {
  background: #c0392b;
  color: white;
  transform: scale(1.05);
}

/* PULSE */
.pulse {
  animation: pulse 1.4s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.06); }
  100% { transform: scale(1); }
}

.explain-box {
  display: none;
  margin-top: 10px;
  padding: 10px;
  background: #f0ede6;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>US Citizenship Test</h1>
<p class="subtitle">Practice Quiz</p>

<div class="card">
  <div id="question">Question here</div>
  <div id="answers"></div>

  <div id="feedback"></div>
</div>

<script>
let lang = "en";

function showWrongAnswer(correct, explanation) {
  const feedback = document.getElementById("feedback");

  feedback.innerHTML = `
    <p>Correct answer: ${correct}</p>

    <button class="explain-btn pulse" onclick="toggleExplanation()">
      ${lang === "en" ? "Learn more here!" : "¡Aprende más aquí!"}
    </button>

    <div id="explanation-box" class="explain-box">
      ${lang === "en" ? explanation.en : explanation.es}
    </div>
  `;
}

function toggleExplanation() {
  const box = document.getElementById("explanation-box");
  box.style.display = box.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html><script src="quiz.js"></script>
